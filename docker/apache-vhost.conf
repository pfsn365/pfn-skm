<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Slim 2 has no front-controller rewrite of its own (no .htaccess in
        # the repo) — every request except a real file falls through to
        # index.php, which Slim's own router then dispatches.
        FallbackResource /index.php
    </Directory>

    # vendor/, cronjobs/, scripts/, data/ are never meant to be served directly.
    <DirectoryMatch "/var/www/html/(vendor|cronjobs|scripts|data)">
        Require all denied
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
