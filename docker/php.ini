; Slim 2's bootstrap throws PHP 8 deprecation notices before index.php's own
; error_reporting(1) call runs. With display_errors on (the image default),
; those notices get echoed into every response body and break status codes
; that depend on no output having started yet (e.g. /health-check's 204).
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
